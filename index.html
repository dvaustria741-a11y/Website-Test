<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#00ff41;font-family:'Share Tech Mono','Courier New',monospace;min-height:100vh;overflow-x:hidden;animation:flicker 5s infinite}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:100}
  @keyframes flicker{0%,100%{opacity:1}93%{opacity:.85}94%{opacity:1}96%{opacity:.9}97%{opacity:1}}
  #screen{max-width:860px;margin:0 auto;padding:24px 20px 60px}
  .header{border:1px solid #00ff41;padding:12px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 0 12px #00ff4155,inset 0 0 12px #00ff4110}
  .header-title{font-size:.75rem;letter-spacing:.15em;opacity:.7}
  .header-id{font-size:.7rem;color:#00cc33}
  #clock{font-size:.75rem;opacity:.6}
  .log-line{font-size:.82rem;line-height:1.8;white-space:pre-wrap;word-break:break-all}
  .log-line.dim{color:#007a20}.log-line.warn{color:#ffe600}.log-line.bright{color:#afffca;font-weight:bold}.log-line.red{color:#ff3c3c}
  .progress-bar{display:flex;align-items:center;gap:10px;margin:4px 0;font-size:.82rem}
  .bar-track{width:220px;height:10px;border:1px solid #00ff41;background:#001a07;position:relative;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,#004d15,#00ff41);width:0%;transition:width .05s linear;box-shadow:2px 0 8px #00ff41}
  .bar-pct{min-width:38px;font-size:.78rem}
  .result-box{border:1px solid #00ff41;padding:18px 22px;margin-top:22px;box-shadow:0 0 24px #00ff4144,inset 0 0 18px #00ff4108;display:none}
  .result-box.show{display:block}
  .result-title{font-size:.68rem;letter-spacing:.2em;color:#007a20;margin-bottom:14px;border-bottom:1px solid #003d10;padding-bottom:8px}
  .field{display:grid;grid-template-columns:180px 1fr;gap:4px 12px;margin-bottom:8px;font-size:.82rem;align-items:start}
  .field-key{color:#007a20;text-align:right}.field-val{color:#afffca}
  @keyframes textglow{0%{color:#fff;text-shadow:0 0 16px #00ff41}100%{color:#afffca;text-shadow:none}}
  .glow{animation:textglow 1.4s ease-out forwards}
  .map-box{margin-top:16px;border:1px solid #003d10;height:160px;background:#000e03;position:relative;overflow:hidden}
  .map-grid{position:absolute;inset:0;background-image:linear-gradient(#001a0720 1px,transparent 1px),linear-gradient(90deg,#001a0720 1px,transparent 1px);background-size:28px 28px}
  .map-ping{position:absolute;width:14px;height:14px;border-radius:50%;background:#00ff41;box-shadow:0 0 20px #00ff41;top:50%;left:50%;transform:translate(-50%,-50%)}
  .map-ring{position:absolute;border:1px solid #00ff41;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:ping 2s ease-out infinite;opacity:0}
  .map-ring:nth-child(2){animation-delay:.6s}.map-ring:nth-child(3){animation-delay:1.2s}
  @keyframes ping{0%{width:14px;height:14px;opacity:.9}100%{width:110px;height:110px;opacity:0}}
  .map-coords{position:absolute;bottom:6px;right:8px;font-size:.62rem;color:#004d15}
  .map-label{position:absolute;top:8px;left:10px;font-size:.62rem;color:#004d15}
  .gmaps-btn{display:inline-block;margin-top:14px;padding:9px 18px;border:1px solid #00ff41;color:#00ff41;text-decoration:none;font-family:inherit;font-size:.8rem;letter-spacing:.1em;cursor:pointer;background:transparent;box-shadow:0 0 10px #00ff4133;transition:all .2s}
  .gmaps-btn:hover{background:#00ff4115;box-shadow:0 0 20px #00ff4166}
  .cursor{display:inline-block;width:8px;height:14px;background:#00ff41;vertical-align:middle;animation:blink .8s step-end infinite;margin-left:2px}
  @keyframes blink{50%{opacity:0}}
  .alert-banner{background:#ff0000;color:#fff;text-align:center;padding:10px;font-size:.9rem;letter-spacing:.12em;margin-top:22px;animation:alertpulse 1s ease-in-out infinite alternate;display:none}
  .alert-banner.show{display:block}
  @keyframes alertpulse{from{opacity:1}to{opacity:.55}}
</style>
</head>
<body>
<div id="screen">
  <div class="header">
    <div>
      <div class="header-title">◈ NETWORK INTELLIGENCE SYSTEM v4.2.1</div>
      <div class="header-id">SESSION: <span id="sessId"></span></div>
    </div>
    <div id="clock"></div>
  </div>

  <div id="log"></div>

  <div class="result-box" id="resultBox">
    <div class="result-title">▸ TARGET PROFILE — ACQUIRED</div>
    <div class="field"><span class="field-key">IP ADDRESS</span>   <span class="field-val" id="r-ip"></span></div>
    <div class="field"><span class="field-key">ISP / ORG</span>    <span class="field-val" id="r-isp"></span></div>
    <div class="field"><span class="field-key">DEVICE</span>       <span class="field-val" id="r-device"></span></div>
    <div class="field"><span class="field-key">OS</span>           <span class="field-val" id="r-os"></span></div>
    <div class="field"><span class="field-key">BROWSER</span>      <span class="field-val" id="r-browser"></span></div>
    <div class="field"><span class="field-key">BATTERY</span>      <span class="field-val" id="r-battery"></span></div>
    <div class="field"><span class="field-key">COUNTRY</span>      <span class="field-val" id="r-country"></span></div>
    <div class="field"><span class="field-key">REGION</span>       <span class="field-val" id="r-region"></span></div>
    <div class="field"><span class="field-key">CITY</span>         <span class="field-val" id="r-city"></span></div>
    <div class="field"><span class="field-key">TIMEZONE</span>     <span class="field-val" id="r-tz"></span></div>
    <div class="field"><span class="field-key">LATITUDE</span>     <span class="field-val" id="r-lat"></span></div>
    <div class="field"><span class="field-key">LONGITUDE</span>    <span class="field-val" id="r-lng"></span></div>
    <div class="field"><span class="field-key">GPS ACCURACY</span> <span class="field-val" id="r-acc"></span></div>

    <div class="map-box">
      <div class="map-grid"></div>
      <div class="map-ring"></div>
      <div class="map-ring"></div>
      <div class="map-ring"></div>
      <div class="map-ping"></div>
      <div class="map-label">▸ LIVE POSITION LOCK</div>
      <div class="map-coords" id="mapCoords"></div>
    </div>
    <a class="gmaps-btn" id="gmapsBtn" href="#" target="_blank">▸ OPEN IN GOOGLE MAPS</a>
  </div>

  <div class="alert-banner" id="alertBanner">
    ⚠ LOCATION LOCK CONFIRMED — COORDINATES TRANSMITTED ⚠
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const logEl=$('log');
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function hex(n){return[...Array(n)].map(()=>Math.floor(Math.random()*16).toString(16)).join('')}
function pad(n){return String(n).padStart(2,'0')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function tick(){const d=new Date();$('clock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} UTC+8`}
tick();setInterval(tick,1000);
$('sessId').textContent=(hex(4)+'-'+hex(4)+'-'+hex(4)).toUpperCase();

let queue=[],running=false;
function addLine(t,cls='',delay=0){queue.push({t,cls,delay});if(!running)flush()}
function addProgress(label,fillMs=1600){queue.push({type:'p',label,fillMs});if(!running)flush()}

async function flush(){
  running=true;
  while(queue.length){
    const item=queue.shift();
    if(item.type==='p') await runBar(item.label,item.fillMs);
    else{if(item.delay)await sleep(item.delay);await typeLine(item.t,item.cls)}
  }
  running=false;
}

function typeLine(text,cls){
  return new Promise(res=>{
    const div=document.createElement('div');div.className='log-line '+cls;logEl.appendChild(div);
    let i=0;const cur=document.createElement('span');cur.className='cursor';div.appendChild(cur);
    const speed=text.length>60?7:20;
    const iv=setInterval(()=>{cur.remove();div.textContent=text.slice(0,++i);div.appendChild(cur);
      if(i>=text.length){clearInterval(iv);cur.remove();res()}},speed);
  });
}

function runBar(label,fillMs){
  return new Promise(res=>{
    const wrap=document.createElement('div');wrap.className='progress-bar';
    const track=document.createElement('div');track.className='bar-track';
    const fill=document.createElement('div');fill.className='bar-fill';
    const pct=document.createElement('div');pct.className='bar-pct';
    const lbl=document.createElement('div');lbl.className='log-line dim';
    track.appendChild(fill);wrap.appendChild(lbl);wrap.appendChild(track);wrap.appendChild(pct);
    lbl.textContent=label;logEl.appendChild(wrap);
    let p=0;const step=100/(fillMs/30);
    const iv=setInterval(()=>{p=Math.min(p+step*(.5+Math.random()),100);fill.style.width=p+'%';pct.textContent=Math.floor(p)+'%';
      if(p>=100){clearInterval(iv);res()}},30);
  });
}

new MutationObserver(()=>window.scrollTo(0,document.body.scrollHeight)).observe(logEl,{childList:true,subtree:true});
function setField(id,val){const el=$(id);if(!el)return;el.textContent=val;el.classList.remove('glow');void el.offsetWidth;el.classList.add('glow')}

function getOS(){
  const ua=navigator.userAgent;
  if(/android/i.test(ua)){const m=ua.match(/Android\s([\d.]+)/);return'Android '+(m?m[1]:'')}
  if(/iphone|ipad/i.test(ua)){const m=ua.match(/OS\s([\d_]+)/);return'iOS '+(m?m[1].replace(/_/g,'.'):'')}
  if(/windows nt 10/i.test(ua))return'Windows 10/11';
  if(/windows/i.test(ua))return'Windows';
  if(/mac/i.test(ua))return'macOS';
  return'Unknown OS';
}
function getBrowser(){
  const ua=navigator.userAgent;
  if(/SamsungBrowser\/([\d.]+)/.test(ua))return'Samsung Internet '+RegExp.$1;
  if(/Chrome\/([\d.]+)/.test(ua)&&!/Edg/.test(ua))return'Chrome '+RegExp.$1;
  if(/Firefox\/([\d.]+)/.test(ua))return'Firefox '+RegExp.$1;
  if(/Edg\/([\d.]+)/.test(ua))return'Edge '+RegExp.$1;
  return'Safari/Unknown';
}
function getDevice(){
  const ua=navigator.userAgent;
  // try to extract device model from UA
  let m=ua.match(/\(Linux;[^)]*;\s*([^)]+)\)/);
  if(m)return m[1].trim().split(' Build')[0];
  m=ua.match(/\(([^)]+)\)/);
  if(m)return m[1].split(';').map(s=>s.trim())[1]||'Unknown';
  return'Unknown Device';
}

(async()=>{
  // ── phase 1: firewall ──────────────────────────────────────
  addLine('> INITIALIZING CONNECTION...','dim',300);
  addLine(`> NODE HANDSHAKE: ${hex(8).toUpperCase()}.${hex(4).toUpperCase()}`,'dim');
  addLine('> ENCRYPTING CHANNEL  [AES-256-GCM]','dim');
  addLine('> BYPASSING FIREWALL...','dim');
  addProgress('  FIREWALL BYPASS ',1400);
  await sleep(200);
  addLine('> FIREWALL BYPASSED ✓','');

  // ── phase 2: IP lookup (runs in background, no popup) ──────
  addLine('> RESOLVING TARGET IP ADDRESS...','dim');
  addProgress('  IP RESOLUTION   ',800);

  let geo={ip:'—',org:'—',city:'—',region:'—',country_name:'—',timezone:'—',latitude:0,longitude:0};
  try{
    const r=await fetch('https://ipapi.co/json/');
    geo=await r.json();
  }catch(e){}

  addLine(`> TARGET IP DETECTED: ${geo.ip}`,'bright');
  addLine(`> ISP: ${geo.org}`,'');
  addLine(`> LOCATION HINT: ${geo.city}, ${geo.region}`,'');

  // ── phase 3: device fingerprint ────────────────────────────
  addLine('> PROBING DEVICE FINGERPRINT...','dim');
  addProgress('  DEVICE SCAN     ',1200);
  const realOS=getOS();
  const realBrowser=getBrowser();
  const realDevice=getDevice();
  addLine(`> DEVICE: ${realDevice}`,'bright');
  addLine(`> OS: ${realOS}  |  BROWSER: ${realBrowser}`,'');

  // ── phase 4: GPS via browser (popup appears here) ──────────
  addLine('> INJECTING PRECISION GPS PROBE...','warn');
  addLine('> ACQUIRING SATELLITE LOCK...','warn');

  // kick off geolocation — popup appears now while bars run
  const gpsPromise = new Promise((res)=>{
    navigator.geolocation.getCurrentPosition(
      pos=>res({ok:true,pos}),
      err=>res({ok:false}),
      {enableHighAccuracy:true,timeout:30000,maximumAge:0}
    );
  });

  addProgress('  CELL TOWERS     ',1100);
  addProgress('  BSSID SCAN      ',900);
  addProgress('  SATELLITE LOCK  ',2000);

  // wait for GPS result (user has had time to tap Allow during the bars)
  const gpsResult = await gpsPromise;

  let lat,lng,acc;
  if(gpsResult.ok){
    lat=gpsResult.pos.coords.latitude;
    lng=gpsResult.pos.coords.longitude;
    acc=Math.round(gpsResult.pos.coords.accuracy);
    addLine('> GPS LOCK ACQUIRED ✓','bright');
    addLine(`> LAT: ${lat.toFixed(6)}   LNG: ${lng.toFixed(6)}`,'bright');
    addLine(`> ACCURACY: ±${acc} meters`,'');
  } else {
    // fallback to IP coords
    lat=geo.latitude;
    lng=geo.longitude;
    acc=1500;
    addLine('> GPS DENIED — USING IP TRIANGULATION','red');
    addLine(`> LAT: ${lat.toFixed(6)}   LNG: ${lng.toFixed(6)}`,'bright');
  }

  addLine('','');
  addLine('> COMPILING FULL REPORT...','warn',200);
  addProgress('  COMPILE REPORT  ',600);

  // ── result ─────────────────────────────────────────────────
  $('resultBox').classList.add('show');
  setField('r-ip',      geo.ip);
  setField('r-isp',     geo.org);
  setField('r-device',  realDevice);
  setField('r-os',      realOS);
  setField('r-browser', realBrowser);
  setField('r-country', geo.country_name);
  setField('r-region',  geo.region);
  setField('r-city',    geo.city);
  setField('r-tz',      geo.timezone||'N/A');
  setField('r-lat',     lat.toFixed(6));
  setField('r-lng',     lng.toFixed(6));
  setField('r-acc',     gpsResult.ok ? `±${acc} meters (GPS)` : `±${acc} meters (IP)`);
  setField('r-battery', '...');

  $('mapCoords').textContent=`${lat.toFixed(4)} / ${lng.toFixed(4)}`;
  $('gmapsBtn').href=`https://www.google.com/maps?q=${lat},${lng}`;

  await sleep(600);
  $('alertBanner').classList.add('show');
  window.scrollTo(0,document.body.scrollHeight);

  if('getBattery' in navigator){
    navigator.getBattery().then(b=>{
      setField('r-battery',Math.round(b.level*100)+'% — '+(b.charging?'charging':'not charging'));
    });
  } else {
    setField('r-battery',rnd(20,95)+'% — '+(Math.random()>.5?'charging':'not charging'));
  }
})();
</script>
</body>
</html>
