<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#00ff41;font-family:'Share Tech Mono','Courier New',monospace;min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}

  #overlay{position:fixed;inset:0;background:#000;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  #overlay p{font-size:1.1rem;opacity:0.7;animation:blink 1s infinite}
  #spinner{width:60px;height:60px;border:4px solid #00ff4133;border-top-color:#00ff41;border-radius:50%;animation:spin 0.8s linear infinite}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes blink{0%,100%{opacity:0.4}50%{opacity:1}}
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.6}94%{opacity:1}96%{opacity:0.7}97%{opacity:1}}
  @keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-2px,-2px)}80%{transform:translate(2px,2px)}}
  @keyframes scanline{0%{top:-10%}100%{top:110%}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 10px #00ff41,0 0 20px #00ff4155}50%{box-shadow:0 0 30px #00ff41,0 0 60px #00ff4188}}
  @keyframes redpulse{0%,100%{box-shadow:0 0 10px #ff0000,0 0 20px #ff000055}50%{box-shadow:0 0 30px #ff0000,0 0 60px #ff000088}}
  @keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-8px,0)}20%{transform:translate(8px,0)}30%{transform:translate(-6px,0)}40%{transform:translate(6px,0)}50%{transform:translate(-4px,0)}60%{transform:translate(4px,0)}70%{transform:translate(-2px,0)}80%{transform:translate(2px,0)}90%{transform:translate(-1px,0)}}

  .scanline{position:fixed;width:100%;height:3px;background:linear-gradient(transparent,#00ff4122,transparent);animation:scanline 4s linear infinite;pointer-events:none;z-index:100}

  #main{display:none;width:90%;max-width:700px;padding:20px;animation:fadeIn 0.5s ease}

  .terminal-box{border:1px solid #00ff41;padding:20px;margin:16px 0;animation:pulse 2s infinite;position:relative;overflow:hidden}
  .terminal-box::before{content:'';position:absolute;inset:0;background:linear-gradient(transparent 50%,#00ff4108 50%);background-size:100% 4px;pointer-events:none}

  .terminal-box.red{border-color:#ff0000;color:#ff4444;animation:redpulse 1.5s infinite}
  .terminal-box.red .label{color:#ff0000}

  .label{color:#00ff41;font-size:0.7rem;opacity:0.7;margin-bottom:6px;letter-spacing:2px}
  .value{font-size:1.3rem;font-weight:bold;letter-spacing:1px}

  #alert-header{text-align:center;margin-bottom:10px}
  #alert-header .big{font-size:2rem;animation:glitch 0.3s infinite;color:#ff0000;letter-spacing:4px}
  #alert-header .sub{font-size:0.85rem;opacity:0.7;margin-top:6px;color:#ffaa00}

  #log{border:1px solid #00ff4144;padding:12px;font-size:0.75rem;max-height:160px;overflow-y:auto;line-height:1.8;opacity:0.8}
  #log::-webkit-scrollbar{width:4px}
  #log::-webkit-scrollbar-thumb{background:#00ff41}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}

  #close-btn{display:block;margin:20px auto 0;background:transparent;border:1px solid #00ff4166;color:#00ff41;font-family:inherit;font-size:0.85rem;padding:10px 28px;cursor:pointer;letter-spacing:2px;transition:all 0.2s}
  #close-btn:hover{background:#00ff4122;border-color:#00ff41}

  .tag{display:inline-block;background:#00ff4122;border:1px solid #00ff4166;padding:2px 8px;font-size:0.7rem;margin-right:6px;border-radius:2px}
</style>
</head>
<body>
<div class="scanline"></div>

<div id="overlay">
  <div id="spinner"></div>
  <p>SCANNING...</p>
</div>

<div id="main">
  <div id="alert-header">
    <div class="big">⚠ LOCATION DETECTED ⚠</div>
    <div class="sub">Your device has been identified on our network</div>
  </div>

  <div class="terminal-box red">
    <div class="label">◈ PRIMARY TARGET</div>
    <div class="value" id="loc-city">--</div>
    <div style="font-size:0.8rem;margin-top:6px;opacity:0.8" id="loc-region">Locating...</div>
  </div>

  <div class="grid2">
    <div class="terminal-box">
      <div class="label">◈ IP ADDRESS</div>
      <div class="value" id="loc-ip">...</div>
    </div>
    <div class="terminal-box">
      <div class="label">◈ ISP / ORG</div>
      <div class="value" style="font-size:0.9rem" id="loc-isp">...</div>
    </div>
    <div class="terminal-box">
      <div class="label">◈ COUNTRY</div>
      <div class="value" id="loc-country">...</div>
    </div>
    <div class="terminal-box">
      <div class="label">◈ TIMEZONE</div>
      <div class="value" style="font-size:0.9rem" id="loc-tz">...</div>
    </div>
  </div>

  <div id="log"></div>

  <button id="close-btn" onclick="endPrank()">[ I KNOW, IT'S A PRANK 😂 ]</button>
</div>

<audio id="snd" preload="auto">
  <source id="snd-src" type="audio/mpeg">
</audio>

<script>


const log = document.getElementById('log');
let logLines = [];
function addLog(msg, color){
  const d = new Date();
  const ts = `[${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}]`;
  logLines.push(`<span style="opacity:0.5">${ts}</span> <span style="color:${color||'#00ff41'}">${msg}</span>`);
  log.innerHTML = logLines.join('<br>');
  log.scrollTop = log.scrollHeight;
}

async function init(){
  await new Promise(r=>setTimeout(r, 2000));

  // Play sound
  const snd = document.getElementById('snd');
  document.getElementById('snd-src').src = 'data:audio/mpeg;base64,' + MP3_DATA;
  snd.load();
  snd.volume = 0.85;
  snd.play().catch(()=>{});

  // Show main
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  // Shake body
  document.body.style.animation = 'shake 0.6s ease, flicker 5s infinite';
  setTimeout(()=>document.body.style.animation='flicker 5s infinite', 700);

  addLog('Connection established...','#ffaa00');
  addLog('Querying IP geolocation database...','#00ff41');
  addLog('Bypassing firewall...','#ff4444');

  try {
    const res = await fetch('https://ipapi.co/json/');
    const d = await res.json();

    await new Promise(r=>setTimeout(r,400));
    addLog(`Target IP resolved: ${d.ip}`,'#ff4444');
    document.getElementById('loc-ip').textContent = d.ip || 'Unknown';

    await new Promise(r=>setTimeout(r,350));
    addLog(`ISP identified: ${d.org}`,'#ffaa00');
    document.getElementById('loc-isp').textContent = d.org || 'Unknown';

    await new Promise(r=>setTimeout(r,350));
    document.getElementById('loc-country').textContent = (d.country_name || 'Unknown') + ' ' + (d.country_code ? `(${d.country_code})` : '');
    document.getElementById('loc-tz').textContent = d.timezone || 'Unknown';

    await new Promise(r=>setTimeout(r,300));
    const city = d.city || 'Unknown City';
    const region = d.region || '';
    document.getElementById('loc-city').textContent = city;
    document.getElementById('loc-region').textContent = `${region}, ${d.country_name || ''}`;
    addLog(`📍 Location pinpointed: ${city}, ${region}`,'#ff0000');

    await new Promise(r=>setTimeout(r,200));
    addLog('Data capture complete.','#ff4444');
    addLog('😂 jk this is just a prank bro','#00ff41');
  } catch(e) {
    addLog('Could not fetch location. Firewall active?','#ff4444');
    document.getElementById('loc-city').textContent = 'Unknown';
  }
}

function endPrank(){
  document.getElementById('snd').pause();
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#00ff41;font-family:monospace;font-size:1.5rem;text-align:center">😂<br>GOT YOU!<br><span style="font-size:1rem;opacity:0.6;margin-top:10px;display:block">Refresh to reset</span></div>';
}

init();
</script>
<audio id="prank-snd" preload="auto"><source src="sound.mp3" type="audio/mpeg"></audio>
<script>
  // Play sound as soon as user interacts or page loads
  var snd = document.getElementById('prank-snd');
  snd.volume = 0.9;
  var played = false;
  function tryPlay(){ if(!played){ snd.play().then(()=>played=true).catch(()=>{}); } }
  document.addEventListener('click', tryPlay);
  document.addEventListener('touchstart', tryPlay);
  window.addEventListener('load', ()=>setTimeout(tryPlay, 500));
</script>
</body>
</html>
